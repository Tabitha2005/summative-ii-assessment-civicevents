<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Event Detail — CivicEvents+</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <link rel="stylesheet" href="css/custom.css">
  <script src="js/config.js"></script>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">
  <div id="nav-placeholder"></div>

  <main class="flex-1 max-w-4xl mx-auto w-full px-4 py-8" id="event-detail">
    <a href="./events.html" class="inline-flex items-center gap-1.5 text-indigo-600 text-sm font-medium hover:text-indigo-800 transition mb-6 group">
      <svg class="w-4 h-4 group-hover:-translate-x-0.5 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
      Back to Events
    </a>

    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden mb-6">
      <div class="relative">
        <div id="event-img-container" class="w-full hero-img-sm bg-gradient-to-br from-indigo-900 via-indigo-700 to-purple-800 relative overflow-hidden">
          <img id="event-img" src="" alt="" class="w-full hero-img-sm object-cover absolute inset-0">
          <div class="absolute inset-0 flex items-center justify-center">
            <svg class="w-16 h-16 text-white/10" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
          </div>
        </div>
        <div class="absolute inset-0 bg-gradient-to-t from-black/60 via-transparent to-transparent"></div>
        <div class="absolute bottom-0 left-0 right-0 p-6">
          <h1 id="event-title" class="text-2xl sm:text-3xl font-extrabold text-white leading-tight"></h1>
        </div>
      </div>

      <div class="p-6">
        <div class="event-meta-grid mb-6">
          <div class="flex items-center gap-3 bg-indigo-50 rounded-xl p-3">
            <div class="w-9 h-9 bg-indigo-100 rounded-lg flex items-center justify-center text-lg flex-shrink-0">📍</div>
            <div>
              <p class="text-xs text-gray-400 font-medium">Location</p>
              <p id="event-location" class="text-sm font-semibold text-gray-800"></p>
              <a id="map-link" href="#" target="_blank" rel="noopener" class="text-xs text-indigo-600 hover:underline hidden">View on map →</a>
            </div>
          </div>
          <div class="flex items-center gap-3 bg-green-50 rounded-xl p-3">
            <div class="w-9 h-9 bg-green-100 rounded-lg flex items-center justify-center text-lg flex-shrink-0">🕐</div>
            <div>
              <p class="text-xs text-gray-400 font-medium">Starts</p>
              <p id="event-start" class="text-sm font-semibold text-gray-800"></p>
            </div>
          </div>
          <div class="flex items-center gap-3 bg-orange-50 rounded-xl p-3">
            <div class="w-9 h-9 bg-orange-100 rounded-lg flex items-center justify-center text-lg flex-shrink-0">🕔</div>
            <div>
              <p class="text-xs text-gray-400 font-medium">Ends</p>
              <p id="event-end" class="text-sm font-semibold text-gray-800"></p>
            </div>
          </div>
        </div>

        <p id="event-desc" class="text-gray-700 leading-relaxed mb-6"></p>

        <div class="flex gap-3 flex-wrap">
          <button id="reg-btn" type="button" data-registered="false"
            class="btn-primary flex-1 sm:flex-none justify-center"
            aria-label="Register for event">Register for Event</button>
          <a id="admin-edit-btn" href="#"
            class="hidden inline-flex items-center gap-2 px-4 py-2.5 bg-yellow-50 text-yellow-700 border border-yellow-200 rounded-xl text-sm font-medium hover:bg-yellow-100 transition">
            Edit Event
          </a>
          <button id="admin-delete-btn"
            class="hidden inline-flex items-center gap-2 px-4 py-2.5 bg-red-50 text-red-600 border border-red-200 rounded-xl text-sm font-medium hover:bg-red-100 transition">
            Delete
          </button>
        </div>
      </div>
    </div>

    <section id="attendees-section" class="hidden bg-white rounded-2xl shadow-sm border border-gray-100 p-6 mb-6">
      <h2 class="font-bold text-gray-800 mb-4">Registered Attendees</h2>
      <ul id="attendees-list" class="divide-y divide-gray-100"></ul>
    </section>

    <section class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
      <h2 class="font-bold text-gray-800 mb-1 flex items-center gap-2">
        <svg class="w-5 h-5 text-yellow-500" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
        Feedback
      </h2>
      <p id="feedback-avg" class="text-sm text-gray-500 mb-5"></p>
      <div id="feedback-list" class="mb-6 space-y-3"></div>

      <div id="feedback-form-section">
        <h3 class="font-semibold text-gray-700 mb-4 text-sm">Leave Your Feedback</h3>
        <form id="feedback-form" onsubmit="return false;">
          <div class="mb-4">
            <label class="block text-sm text-gray-600 mb-2">Rating <span class="text-red-500">*</span></label>
            <div id="star-rating" class="flex gap-2 text-3xl text-gray-300 cursor-pointer">
              <span data-val="1">★</span>
              <span data-val="2">★</span>
              <span data-val="3">★</span>
              <span data-val="4">★</span>
              <span data-val="5">★</span>
            </div>
          </div>
          <div class="mb-4">
            <label for="feedback-comment" class="block text-sm text-gray-600 mb-1">Comment <span class="text-gray-400">(optional)</span></label>
            <textarea id="feedback-comment" rows="3" class="form-input" placeholder="Share your experience..."></textarea>
          </div>
          <button id="feedback-submit-btn" type="button" class="btn-primary">Submit Feedback</button>
        </form>
      </div>
    </section>
  </main>

  <div id="footer-placeholder"></div>

  <script>
  $(function () {
    setupAjax();
    authGuard();
    if (isAdmin()) { window.location.href = './dashboard.html'; return; }
    $('#nav-placeholder').load('partials/nav.html');
    $('#footer-placeholder').load('partials/footer.html');

    const eventId = new URLSearchParams(window.location.search).get('id')
                  || sessionStorage.getItem('ce_event_id');
    sessionStorage.removeItem('ce_event_id');
    if (eventId) sessionStorage.setItem('ce_event_id', eventId);

    if (!eventId) {
      showToast('No event selected.', 'error');
      setTimeout(() => window.location.href = './events.html', 1500);
      return;
    }

    // Hide register/feedback for admins
    if (isAdmin()) {
      $('#reg-btn').addClass('hidden');
      $('#feedback-form-section').addClass('hidden');
    }

    // Load event data
    $.get(BASE_URL + '/api/events/' + eventId)
      .done(res => {
        const ev = res.data || res;
        $('#event-title').text(ev.title || '');
        $('#event-location').text(ev.location || 'TBC');
        $('#event-desc').text(ev.description || '');
        $('#event-start').text(ev.starts_at ? new Date(ev.starts_at).toLocaleString('en-GB') : 'TBC');
        $('#event-end').text(ev.ends_at     ? new Date(ev.ends_at).toLocaleString('en-GB')   : 'TBC');

        const imgUrl = ev.image_url
          ? (ev.image_url.startsWith('http') ? ev.image_url : BASE_URL + ev.image_url)
          : (ev.metadata && ev.metadata.image_url ? BASE_URL + '/uploads/events/' + ev.metadata.image_url.replace(/^.*uploads\/events\//, '') : null);
        if (imgUrl) $('#event-img').attr('src', imgUrl).attr('alt', ev.title);

        if (ev.location) {
          $('#map-link').attr('href', 'https://maps.google.com/?q=' + encodeURIComponent(ev.location)).removeClass('hidden');
        }

        if (isAdmin()) {
          $('#admin-edit-btn').data('evid', ev.id).removeClass('hidden');
          $('#admin-delete-btn').removeClass('hidden');
          $('#attendees-section').removeClass('hidden');
          loadAttendees(ev.id);
        }
      })
      .fail(() => showToast('Could not load event.', 'error'));

    // Check registration status
    if (!isAdmin()) {
      $.get(BASE_URL + '/api/event-registrations/my-registrations')
        .done(res => {
          const regs = extractList(res, ['registrations', 'data', 'results']);
          const existing = regs.find(r => r.event_id === eventId && r.status !== 'cancelled');
          if (existing) {
            $('#reg-btn').text('Cancel Registration')
              .attr('data-registered', 'true')
              .removeClass('bg-indigo-600 hover:bg-indigo-700')
              .addClass('bg-red-500 hover:bg-red-600');
          }
        });
    }

    // Register / Cancel
    $('#reg-btn').on('click', function () {
      if (!isLoggedIn()) { window.location.href = 'login.html'; return; }
      const $btn         = $(this).prop('disabled', true);
      const isRegistered = $btn.attr('data-registered') === 'true';

      if (isRegistered) {
        $.ajax({ url: BASE_URL + '/api/event-registrations/cancel', method: 'POST',
          contentType: 'application/json', data: JSON.stringify({ event_id: eventId }) })
        .done(() => {
          showToast('Registration cancelled.', 'info');
          $btn.text('Register for Event').attr('data-registered', 'false')
            .removeClass('bg-red-500 hover:bg-red-600').addClass('bg-indigo-600 hover:bg-indigo-700')
            .prop('disabled', false);
        })
        .fail(() => { showToast('Could not cancel.', 'error'); $btn.prop('disabled', false); });
      } else {
        $.ajax({ url: BASE_URL + '/api/event-registrations/register', method: 'POST',
          contentType: 'application/json', data: JSON.stringify({ event_id: eventId }) })
        .done(() => {
          showToast('Registered successfully!', 'success');
          $btn.text('Cancel Registration').attr('data-registered', 'true')
            .removeClass('bg-indigo-600 hover:bg-indigo-700').addClass('bg-red-500 hover:bg-red-600')
            .prop('disabled', false);
          if (isAdmin()) loadAttendees(eventId);
        })
        .fail(xhr => { showToast(xhr.responseJSON?.message || 'Registration failed.', 'error'); $btn.prop('disabled', false); });
      }
    });

    // Admin edit
    $('#admin-edit-btn').on('click', function (e) {
      e.preventDefault();
      sessionStorage.setItem('ce_edit_event_id', $(this).data('evid'));
      window.location.href = './event-form.html';
    });

    // Admin delete
    $('#admin-delete-btn').on('click', function () {
      if (!confirm('Delete this event?')) return;
      $.ajax({ url: BASE_URL + '/api/events/' + eventId, method: 'DELETE' })
        .done(() => { showToast('Event deleted.', 'success'); setTimeout(() => window.location.href = './events.html', 900); })
        .fail(() => showToast('Delete failed.', 'error'));
    });

    // Star rating
    let selectedRating = 0;
    $('#star-rating span').on('click', function () {
      selectedRating = parseInt($(this).data('val'));
      $('#star-rating span').each(function () {
        $(this).css('color', parseInt($(this).data('val')) <= selectedRating ? '#f59e0b' : '#d1d5db');
      });
    });

    // Submit Feedback — using button type=button, no form submit
    $('#feedback-submit-btn').on('click', function () {
      if (!selectedRating) { showToast('Please select a star rating.', 'warning'); return; }
      const $btn = $(this).prop('disabled', true).text('Submitting...');
      $.ajax({
        url: BASE_URL + '/api/event-feedback', method: 'POST',
        contentType: 'application/json',
        data: JSON.stringify({ event_id: eventId, rating: selectedRating, comment: $('#feedback-comment').val().trim() })
      })
      .done(() => {
        showToast('Feedback submitted! Thank you.', 'success');
        $('#feedback-comment').val('');
        selectedRating = 0;
        $('#star-rating span').css('color', '#d1d5db');
        loadFeedback(eventId);
        $btn.prop('disabled', false).text('Submit Feedback');
      })
      .fail(xhr => {
        showToast(xhr.responseJSON?.message || 'Could not submit feedback.', 'error');
        $btn.prop('disabled', false).text('Submit Feedback');
      });
    });

    // Load feedback
    loadFeedback(eventId);

    function loadAttendees(evId) {
      $.get(BASE_URL + '/api/event-registrations/event/' + evId)
        .done(res => {
          const regs = extractList(res, ['registrations', 'data', 'results']);
          const $list = $('#attendees-list').empty();
          if (!regs.length) { $list.html('<li class="text-sm text-gray-400 py-2">No registrations yet.</li>'); return; }
          regs.forEach(r => {
            const name = r.full_name || r.user?.full_name || 'User';
            $list.append(`
              <li class="flex items-center gap-3 py-2">
                <div class="w-8 h-8 rounded-full bg-indigo-100 flex items-center justify-center text-indigo-700 text-xs font-bold">${name.charAt(0).toUpperCase()}</div>
                <div>
                  <p class="text-sm font-medium text-gray-800">${name}</p>
                  <p class="text-xs text-gray-400">${r.email || r.user?.email || ''}</p>
                </div>
                <span class="ml-auto text-xs px-2 py-0.5 rounded-full ${r.status === 'cancelled' ? 'bg-red-100 text-red-600' : 'bg-green-100 text-green-700'}">${r.status || 'registered'}</span>
              </li>`);
          });
        });
    }

    function loadFeedback(evId) {
      // Use global: false to suppress the ajaxError permission toast for non-admin users
      $.ajax({ url: BASE_URL + '/api/event-feedback/event/' + evId, method: 'GET', global: false })
        .done(res => {
          const list = extractList(res, ['feedback', 'data', 'results']);
          const $fl  = $('#feedback-list').empty();
          if (!list.length) { $fl.html('<p class="text-sm text-gray-400">No feedback yet. Be the first!</p>'); return; }
          const avg = list.reduce((s, f) => s + f.rating, 0) / list.length;
          $('#feedback-avg').text('Average: ' + avg.toFixed(1) + ' / 5 (' + list.length + ' review' + (list.length !== 1 ? 's' : '') + ')');
          list.forEach(f => {
            const stars = '★'.repeat(f.rating) + '☆'.repeat(5 - f.rating);
            $fl.append(`
              <div class="border border-gray-100 rounded-xl p-4 bg-gray-50">
                <div class="flex items-center gap-2 mb-1">
                  <span class="text-yellow-400 text-sm">${stars}</span>
                  <span class="text-xs text-gray-400">${f.full_name || f.user?.full_name || 'User'}</span>
                </div>
                ${f.comment ? `<p class="text-sm text-gray-600">${f.comment}</p>` : ''}
              </div>`);
          });
        }).fail(() => {});
    }
  });
  </script>
</body>
</html>
